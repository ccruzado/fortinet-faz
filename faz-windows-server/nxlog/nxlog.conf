Panic Soft
#NoFreeOnExit TRUE

define ROOT     C:\Program Files\nxlog
define CERTDIR  %ROOT%\cert
define CONFDIR  %ROOT%\conf\nxlog.d
define LOGDIR   %ROOT%\data

include %CONFDIR%\\*.conf
define LOGFILE  %LOGDIR%\nxlog.log
LogFile %LOGFILE%

Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
Pidfile   %ROOT%\data\nxlog.pid
SpoolDir  %ROOT%\data

<Extension _syslog>
    Module      xm_syslog
</Extension>

<Extension _charconv>
    Module      xm_charconv
    AutodetectCharsets iso8859-2, utf-8, utf-16, utf-32
</Extension>

<Extension _exec>
    Module      xm_exec
</Extension>

<Extension _fileop>
    Module      xm_fileop

    <Schedule>
        Every   1 hour
        Exec    if (file_exists('%LOGFILE%') and \
                   (file_size('%LOGFILE%') >= 5M)) \
                    file_cycle('%LOGFILE%', 8);
    </Schedule>

    <Schedule>
        When    @weekly
        Exec    if file_exists('%LOGFILE%') file_cycle('%LOGFILE%', 8);
    </Schedule>
</Extension>

<Extension json>
    Module      xm_json
</Extension>

<Extension syslog>
    Module      xm_syslog
</Extension>

<Input in_windows_events>
    Module      im_msvistalog
    <QueryXML>
        <QueryList>
            <Query Id="0">
                <Select Path="Security">
                    *[System[(EventID=4624 or EventID=4625 or EventID=4688
                              or EventID=4720 or EventID=4722 or EventID=4726 or EventID=4738
                              or EventID=1102)]]
                </Select>
                <Select Path="System">
                    *[System[(EventID=7045)]]
                </Select>
            </Query>
        </QueryList>
    </QueryXML>
</Input>

<Output out_fortianalyzer>
    Module      om_udp
    Host        44.202.62.41
    Port        514

    Exec if defined($Message) and $Message =~ /Account Name:\s+(\S+)/ { $ExtractedAccountName = $1; } \
         if defined($Message) and $Message =~ /Domain Name:\s+(\S+)/  { $ExtractedDomain = $1; } \
         if defined($Message) and $Message =~ /Service Account:\s+(\S+)/ { $ExtractedServiceAccount = $1; } \
         if defined($TargetUserName) { $AccountName = $TargetUserName; } \
         if not defined($AccountName) and defined($SubjectUserName) { $AccountName = $SubjectUserName; } \
         if not defined($AccountName) and defined($ExtractedAccountName) { $AccountName = $ExtractedAccountName; } \
         if not defined($AccountName) and defined($ExtractedServiceAccount) { $AccountName = $ExtractedServiceAccount; } \
         if not defined($AccountName) and defined($UserID) { $AccountName = $UserID; } \
         if defined($TargetDomainName) { $Domain = $TargetDomainName; } \
         if not defined($Domain) and defined($SubjectDomainName) { $Domain = $SubjectDomainName; } \
         if not defined($Domain) and defined($ExtractedDomain) { $Domain = $ExtractedDomain; } \
         $EventID     = string($EventID); \
         $Message     = "Windows audit event - details in extracted fields"; \
         if not defined($IpAddress) { $IpAddress = "0.0.0.0"; } \
         if ($IpAddress == "-") { $IpAddress = "0.0.0.0"; } \
         if ($IpAddress == "") { $IpAddress = "0.0.0.0"; } \
         delete($ExtractedAccountName); \
         delete($ExtractedDomain); \
         delete($ExtractedServiceAccount); \
         delete($EventReceivedTime); \
         delete($SourceModuleName); \
         delete($SourceModuleType); \
         delete($Opcode); \
         delete($OpcodeValue); \
         delete($Task); \
         delete($Keywords); \
         delete($ActivityID); \
         delete($ThreadID); \
         delete($Version); \
         delete($SeverityValue); \
         delete($TransmittedServices); \
         delete($LmPackageName); \
         delete($KeyLength); \
         delete($ImpersonationLevel); \
         delete($RestrictedAdminMode); \
         delete($RemoteCredentialGuard); \
         delete($TargetOutboundUserName); \
         delete($TargetOutboundDomainName); \
         delete($VirtualAccount); \
         delete($TargetLinkedLogonId); \
         delete($ElevatedToken); \
         delete($IpPort); \
         delete($WorkstationName); \
         delete($LogonGuid); \
         delete($LogonProcessName); \
         delete($TargetLogonId); \
         delete($TargetUserSid); \
         delete($SubjectUserSid); \
         delete($DisplayName); \
         delete($HomeDirectory); \
         delete($HomePath); \
         delete($ScriptPath); \
         delete($ProfilePath); \
         delete($UserWorkstations); \
         delete($PasswordLastSet); \
         delete($AccountExpires); \
         delete($UserParameters); \
         delete($LogonHours); \
         delete($UserAccountControl); \
         delete($OldUacValue); \
         delete($NewUacValue); \
         delete($PrimaryGroupId); \
         delete($AllowedToDelegateTo); \
         delete($SidHistory); \
         delete($UserPrincipalName); \
         delete($PrivilegeList); \
         delete($SamAccountName); \
         delete($TargetSid); \
         delete($AccountType); \
         to_json(); \
         $raw_event = replace($raw_event, "%%", "pct_"); \
         $raw_event = replace($raw_event, "$", "_"); \
         $raw_event = replace($raw_event, "\r", " "); \
         $raw_event = replace($raw_event, "\n", " "); \
         $raw_event = replace($raw_event, "\t", " "); \
         $raw_event = '<133>' + strftime(now(), "%b %d %H:%M:%S") + ' ' + $Hostname + ' ' + $raw_event;
</Output>

<Route r1>
    Path        in_windows_events => out_fortianalyzer
</Route>